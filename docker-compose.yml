services:
  stock-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdx-stock-web
    ports:
      - "${ENV_TDX_API_PORT:-8080}:${ENV_TDX_API_PORT:-8080}"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - ENV_TDX_API_HOST=0.0.0.0
      - ENV_TDX_API_PORT=${ENV_TDX_API_PORT:-8080}
    networks:
      - stock-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${ENV_TDX_API_PORT:-8080}/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.stock.description=TDX Stock Data Query System"
      - "com.stock.version=1.0.0"

networks:
  stock-network:
    driver: bridge
